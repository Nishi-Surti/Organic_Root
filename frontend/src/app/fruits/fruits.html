<div class="frt-page">

  <!-- TOP BAR -->
  <div class="top-bar">

    <button class="back-btn" onclick="history.back()">
      ⬅ Back
    </button>

    <div class="title-area">
      <h1>Fresh Fruits</h1>
      <p>Direct from farmers to your home.</p>
    </div>

  </div>


  <!-- PRODUCT GRID -->
  <div class="frt-grid">

    <div class="frt-card" *ngFor="let f of fruits">

      <div class="img-box">
        <img [src]="'http://localhost:3000' + f.pimg">
      </div>

      <div class="frt-info">

        <h3>{{ f.pname }}</h3>

        <p class="price">₹{{ f.price }} <span>/ {{ f.priceUnit }}</span></p>

        <div class="btn-group">

          <button class="cart-btn" (click)="addToCart(f)">
           Add to Cart
          </button>

          <button class="buy-btn" (click)="buyNow(f)">
           Buy Now
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
