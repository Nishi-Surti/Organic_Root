<div class="admin-container">

  <div class="header">
    <h2>📦 Product Management</h2>
    <input type="text"
           placeholder="🔍 Search Product..."
           [(ngModel)]="searchText"
           (input)="searchProduct()">
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Image</th>
          <th>Product</th>
          <th>Farmer</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let product of filteredProducts">
          <td>
            <img [src]="'http://localhost:3000' + product.pimg">
          </td>
          <td>
            <strong>{{product.pname}}</strong><br>
            <small>ID: {{product.product_id}}</small>
          </td>
          <td>
            {{product.farmerName}}<br>
            <small>{{product.farmerVillage}}</small>
          </td>
          <td>
            <span class="badge">{{product.category}}</span>
          </td>
          <td>
            ₹{{product.price}} / {{product.priceUnit}}
          </td>
          <td>
            <span [ngClass]="product.quantity > 0 ? 'stock' : 'out'">
              {{product.quantity}} {{product.quantityUnit}}
            </span>
          </td>
          <td>
            <button class="delete"
                    (click)="deleteProduct(product._id)">
              🗑 Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
