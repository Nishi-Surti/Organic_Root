<div class="dashboard">

  <!-- Header -->
  <div class="header">
    <h2>My Products</h2>
    <p>Manage your products easily</p>
  </div>

  <!-- Category Buttons -->
  <div class="category-scroll">
    <button *ngFor="let cat of categories"
            (click)="filterCategory(cat)"
            [class.active]="selectedCategory === cat">
      {{cat}}
    </button>
  </div>

  <!-- Empty State -->
  <div *ngIf="filteredProducts.length === 0" class="empty">
    📦 No Products Added Yet
  </div>

  <!-- Product Cards -->
  <div class="card-container">

    <div class="product-card" *ngFor="let product of filteredProducts">

      <img [src]="'http://localhost:3000'+ product.pimg" />

      <h3>{{product.pname}}</h3>

      <p class="price">₹ {{product.price}} {{product.priceUnit}}</p>

      <p class="category">{{product.category}}</p>

      <div class="buttons">
        <button class="edit" (click)="openEdit(product)">✏ Edit</button>
        <button class="delete"  (click)="openDelete(product.product_id)">
          🗑 Delete
        </button>
      </div>

    </div>

  </div>

</div>

<div class="delete-modal" *ngIf="showDeleteModal">

  <div class="modal-box">

    <h3>Delete Product</h3>

    <p>Are you sure you want to delete this product?</p>

    <div class="modal-buttons">
      <button class="cancel" (click)="closeDelete()">Cancel</button>
      <button class="confirm" (click)="confirmDelete()">Delete</button>
    </div>

  </div>

</div>

<div class="edit-modal" *ngIf="showEditModal">

  <div class="modal-content">

    <h2>Edit Product</h2>

    <form (ngSubmit)="updateProduct()">

      <div class="form-grid">

        <div class="form-group">
          <label>Product Name</label>
          <input type="text" [(ngModel)]="editProductData.pname" name="pname">
        </div>

        <div class="form-group">
          <label>Category</label>
          <select [(ngModel)]="editProductData.category" name="category">
            <option>Vegetables</option>
            <option>Fruits</option>
            <option>Green Vegetables</option>
            <option>Root Vegetables</option>
          </select>
        </div>

        <div class="form-group">
          <label>Price</label>
          <input type="number" [(ngModel)]="editProductData.price" name="price">
        </div>

        <div class="form-group">
          <label>Price Unit</label>
          <select [(ngModel)]="editProductData.priceUnit" name="priceUnit">
            <option>Kg</option>
            <option>Quintal</option>
            <option>Dozen</option>
            <option>Piece</option>
          </select>
        </div>

        <div class="form-group">
          <label>Quantity</label>
          <input type="number" [(ngModel)]="editProductData.quantity" name="quantity">
        </div>

        <div class="form-group">
          <label>Quantity Unit</label>
          <select [(ngModel)]="editProductData.priceUnit" name="priceUnit">
            <option>Kg</option>
            <option>Quintal</option>
            <option>Dozen</option>
            <option>Piece</option>
          </select>
        </div>

      </div>

      <div class="modal-buttons">
        <button type="button" class="cancel" (click)="closeEdit()">Cancel</button>
        <button type="submit" class="update">Update</button>
      </div>

    </form>

  </div>

</div>
