<section class="contact-section" id="contact">
  <div class="contact-wrapper">
    <!-- Left Info -->
    <div class="contact-left">
      <h2>Contact Us</h2>
      <p class="tagline">We connect farmers directly with consumers for a healthier future.</p>
      <div class="info-item">
        <i class="bx bx-envelope"></i>
        <p>🔐 support@organicroot.com</p>
      </div>

      <div class="info-item">
        <i class="bx bxs-phone-call"></i>
        <p>📞 +91 98765 43210</p>
      </div>

      <div class="info-item">
        <i class="bx bx-map"></i>
        <p>📍 Ellis Bridge, Ahmedabad, Gujarat</p>
      </div>
    </div>

    <!-- Right Form -->
    <div class="contact-right">
      <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
        <input type="text" formControlName="name" placeholder="Your Name" required />
        <input type="text" formControlName="mobile" placeholder="Your Mobile no." required />
        <textarea formControlName="message" rows="4" placeholder="Your Message" required></textarea>
        <button type="submit" [disabled]="contactForm.invalid">Send Message 🚀</button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" *ngIf="toastMessage" [ngClass]="toastType">
    <div class="toast-content">
      <i class="bx" [ngClass]="toastType === 'success' ? 'bx-check-circle' : 'bx-error-circle'"></i>
      <span>{{ toastMessage }}</span>
    </div>
  </div>
</section>
