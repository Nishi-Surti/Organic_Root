        We connect farmers directly with consumers for a healthier future.
      </p>
      <div class="info-item">
        <i class='bx bx-envelope'></i>
        <p> 🔐  support@organicroot.com</p>
      </div>

      <div class="info-item">
        <i class='bx bxs-phone-call'></i>
