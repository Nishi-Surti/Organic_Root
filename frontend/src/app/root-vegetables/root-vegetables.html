  <div class="rt-veg-page">

  <!-- TOP BAR -->
  <div class="top-bar">

    <button class="back-btn" onclick="history.back()">
      ⬅ Back
    </button>

    <div class="title-area">
      <h1>Fresh Root Vegetables</h1>
      <p>Direct from farmers to your home.</p>
    </div>

  </div>


  <!-- PRODUCT GRID -->
  <div class="rt-veg-grid">

    <div class="rt-veg-card" *ngFor="let rt of rtveg">

      <div class="img-box">
        <img [src]="'http://localhost:3000' + rt.pimg">
      </div>

      <div class="rt-veg-info">

        <h3>{{ rt.pname }}</h3>

        <p class="price">₹{{ rt.price }} <span>/ {{ rt.priceUnit }}</span></p>

        <div class="btn-group">

          <button class="cart-btn" (click)="addToCart(rt)">
           Add to Cart
          </button>

          <button class="buy-btn" (click)="buyNow(rt)">
           Buy Now
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
