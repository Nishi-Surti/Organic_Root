<div class="offers-page">

  <h2>🌿 Today’s Fresh Deals</h2>

 <section class="offer-section">
  <h2>🔥 Special Organic Offers</h2>

  <div class="offer-container">

    <div class="offer-card" *ngFor="let product of offers">
      <img [src]="product.image" alt="product">

      <h3>{{product.name}}</h3>

      <p class="price">
        <span class="old-price">₹{{product.originalPrice}}</span>
        <span class="new-price">₹{{product.offerPrice}}</span>
      </p>

      <p class="discount">
        {{product.discount}}% OFF
      </p>

      <button (click)="buyNow(product)">
        Buy Now
      </button>
    </div>

  </div>
</section>

</div>
