<!-- Navbar -->
<header class="navbar">
  <div class="logo">
    <img src="/assets/logo.png" />
  </div>
    <div class="hamburger" (click)="toggleMenu()">
    ☰
  </div>
    <nav class="nav" [class.active]="isMenuOpen">
      <a routerLink="/" (click)="closeMenu()">Home</a>
      <a routerLink="/about" (click)="closeMenu()">About</a>
      <a routerLink="/farmer" (click)="closeMenu()">Farmers</a>
      <a routerLink="/product" (click)="closeMenu()">Product</a>
      <a routerLink="/contact" (click)="closeMenu()">Contact</a>
      <a routerLink="/login" class="login-btn" (click)="closeMenu()">🔐Login </a>

      <button class="lang-btn" (click)="toggleLang()">
  🌐 {{ selectedLang }}
</button>
<div class="lang-dropdown" *ngIf="showLang">
          <div (click)="changeLanguage('en')">English</div>
          <div (click)="changeLanguage('gu')">ગુજરાતી</div>
          <div (click)="changeLanguage('hi')">हिंदी</div>
        </div>
    </nav>

</header>
