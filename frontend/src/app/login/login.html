<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="login-wrapper">

  <div class="login-card">

    <h2>Login</h2>

    <!-- Role Buttons -->
    <div class="role-buttons">
      <button (click)="selectRole('farmer')" [class.active]="selectedRole==='farmer'">Farmer</button>
      <button (click)="selectRole('consumer')" [class.active]="selectedRole==='consumer'">Consumer</button>
      <button (click)="selectRole('admin')" [class.active]="selectedRole==='admin'">Admin</button>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

  <!-- Mobile / Email Field -->
  <div class="input-group" *ngIf="selectedRole !== 'admin'">
    <i class="fa-solid fa-phone icon-left"></i>
    <input type="tel"
           formControlName="mobile"
           placeholder="Mobile Number">
    
       <small class="error" *ngIf="loginForm.get('mobile')?.touched && loginForm.get('mobile')?.invalid">
        <span class="error" *ngIf="loginForm.get('mobile')?.errors?.['required']"> Mobile no. is required </span>
        <span class="error" *ngIf="loginForm.get('mobile')?.errors?.['pattern']">
            Enter valid 10 digit mobile number
        </span>
      </small>
  </div>

  <div class="input-group" *ngIf="selectedRole === 'admin'">
    <i class="fa-solid fa-envelope icon-left"></i>
    <input type="email"
           formControlName="email"
           placeholder="Email Address">

     <small class="error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors">

  <span *ngIf="loginForm.get('email')?.errors?.['required']">
    Email Id is required
  </span>

</small>
  </div>

  <!-- Password -->
  <div class="input-group">
    <i class="fa-solid fa-lock icon-left"></i>

    <input [type]="showPassword ? 'text' : 'password'"
           formControlName="password"
           placeholder="Password">

  <i class="fa-solid icon-right"
   [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
   (click)="togglePassword()">
</i>

     <small class="error" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors">

  <span *ngIf="loginForm.get('password')?.errors?.['required']">
    Password is required
  </span>

</small>

  </div>

  <button class="login-btn">Login</button>

</form>

    <div class="extra-links">
      <a style="cursor: pointer;" (click)="openForgotPasswordModal()">Forgot Password?</a>
      <p>First time user?
        <a routerLink="/regis">Register Here</a>
      </p>
    </div>

  </div>

</div>

<!-- FORGOT PASSWORD MODAL -->
<div class="modal-overlay" *ngIf="isForgotPasswordModalOpen" (click)="closeForgotPasswordModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>🔒 Forgot Password</h3>
      <button class="close-btn" (click)="closeForgotPasswordModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label *ngIf="selectedRole !== 'admin'">Mobile Number</label>
        <label *ngIf="selectedRole === 'admin'">Email Address</label>
        <input *ngIf="selectedRole !== 'admin'" type="text" [(ngModel)]="forgotPasswordData.identifier" placeholder="Enter registered mobile number">
        <input *ngIf="selectedRole === 'admin'" type="email" [(ngModel)]="forgotPasswordData.identifier" placeholder="Enter registered email address">
      </div>
      <div class="form-group">
        <label>New Password</label>
        <div class="password-wrapper">
          <input [type]="showNew ? 'text' : 'password'" [(ngModel)]="forgotPasswordData.newPassword" placeholder="Enter new password">
          <span class="eye-icon" (click)="showNew = !showNew">
            <svg *ngIf="showNew" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg *ngIf="!showNew" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </span>
        </div>
      </div>
      <div class="form-group">
        <label>Re-enter New Password</label>
        <div class="password-wrapper">
          <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="forgotPasswordData.confirmPassword" placeholder="Re-enter new password">
          <span class="eye-icon" (click)="showConfirm = !showConfirm">
            <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#777" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </span>
        </div>
      </div>
      <button class="update-btn" (click)="updateForgotPassword()">Update Password</button>
    </div>
  </div>
</div>
