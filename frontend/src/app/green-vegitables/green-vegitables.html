<div class="gveg-page">

  <!-- TOP BAR -->
  <div class="top-bar">

    <button class="back-btn" onclick="history.back()">
      ⬅ Back
    </button>

    <div class="title-area">
      <h1>Fresh Green Vegetables</h1>
      <p>Direct from farmers to your home.</p>
    </div>

  </div>


  <!-- PRODUCT GRID -->
  <div class="gveg-grid">

    <div class="gveg-card" *ngFor="let g of gveg">

      <div class="img-box">
        <img [src]="'http://localhost:3000' + g.pimg">
      </div>

      <div class="gveg-info">

        <h3>{{ g.pname }}</h3>

        <p class="price">₹{{ g.price }} <span>/ {{ g.priceUnit }}</span></p>

        <div class="btn-group">

          <button class="cart-btn" (click)="addToCart(g)">
           Add to Cart
          </button>

          <button class="buy-btn" (click)="buyNow(g)">
           Buy Now
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
