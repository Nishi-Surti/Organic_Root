<h1>Counter App</h1>
<div style="text-align: center;">
    <h2 class="h2">{{count}}</h2>
    <div>
        <button class=" btn bg-red" (click)="handleDecrement()">Decrement</button>
        <button class="btn bg-yellow" (click)="handleReset()">Reset</button>
        <button class="btn bg-blue" (click)="handleIncrement()">Increment</button>
    </div>
</div>
