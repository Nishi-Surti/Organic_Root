<div class="dashboard-container">

  <!-- Welcome -->
  <div class="welcome-card">

  <div class="welcome-row">

    <h2>👋 Welcome, {{consumerName}}</h2>

    <div class="search-bar">
      🔍
      <input type="text" placeholder="Search vegetables, fruits, dairy..." />
    </div>

  </div>

  <p>Fresh farm products delivered to your home</p>

</div>


  <!-- Category Section -->
  <div class="category-section">

    <div class="category-card" routerLink="/vegitables">
      <div class="icon">🥦</div>
      <h3>Vegetables</h3>
      <p>Fresh & Organic</p>
    </div>

    <div class="category-card" routerLink="/fruits">
      <div class="icon">🍎</div>
      <h3>Fruits</h3>
      <p>Seasonal Fruits</p>
    </div>

    <div class="category-card" routerLink="/green-vegitables">
      <div class="icon">🌾</div>
      <h3>Green Vegetables</h3>
      <p>Healthy Grains</p>
    </div>

    <div class="category-card root" routerLink="/root-vegetables">
      <div class="icon">🥬</div>
      <h3>Root Vegetables</h3>
      <p>Healthy Grains</p>
    </div>

    <div class="category-card offers" routerLink="/consumer/consumer-offers">
      <div class="icon">🔥</div>
      <h3>Offers</h3>
      <p>Hot Deals</p>
    </div>

    <div class="category-card orders" routerLink="/consumer/consumer-order">
      <div class="icon">📦</div>
      <h3>My Orders</h3>
      <p>Track Orders</p>
    </div>

  </div>
</div>
